version: '3.8'

services:
  # Base Infrastructure
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: soc_admin
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: lensvault_soc
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9000:9000"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"

  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
      - "8233:8233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=soc_admin
      - POSTGRES_PWD=secure_password
      - POSTGRES_SEEDS=postgres
    depends_on:
      - postgres

  # Microservices placeholders for Phase 1
  # api-gateway: ...
  # agent-worker: ...
  # web-dashboard: ...
